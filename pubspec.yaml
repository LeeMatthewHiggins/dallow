name: dallow
description: >-
  Codebase intelligence for Dart and Flutter. Finds unreachable dead code,
  dependency drift, circular imports, duplicate blocks, and complexity hot spots.
version: 0.2.1
repository: https://github.com/LeeMatthewHiggins/dallow
issue_tracker: https://github.com/LeeMatthewHiggins/dallow/issues

topics:
  - static-analysis
  - linter
  - dead-code
  - cli
  - monorepo

environment:
  sdk: ^3.6.0

executables:
  dallow:

dependencies:
  analyzer: ^7.0.0
  args: ^2.6.0
  path: ^1.9.0
  pubspec_parse: ^1.5.0
  yaml: ^3.1.0

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^9.0.0
